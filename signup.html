<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="css/create.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
    <script  src="js/signup.js"></script>
</head>
<body>
    <div class="signup-cointainer">

    <header>
        <img src="image/icon.png" style="width:5%;">
        <span id="viconnect">ViConnect</span>
    </header>
  
    <div class="signup-form">
       
       <form>
        <p id="CreateHeading" style="text-align: center;"> Create your Account</p>
        <table class="center">
               
             
                <tr><td>
                <span>First Name</span>
                <span class="error-msg">*</span>
                <input type="text" name="fname" id="fname" placeholder="First Name" >
                <span class="error-msg" id="fname-msg"></span><br></td></tr>

                <tr><td><span>Last Name</span>
                <span class="error-msg">*</span>    
                <input type="text" name="lname" id="lname" placeholder="Last Name" >
                <span class="error-msg" id="lname-msg"></span><br></td></tr>

                <tr><td><span>Email</span>
                <span class="error-msg">*</span>
                <input type="email" name="email" id="email"placeholder="Email Address" >
                <span class="error-msg" id="email-msg"></span><br></td></tr>

                <tr><td><span>Mobile</span>
                <span class="error-msg">*</span>    
                <input type="number" name="number" id="MOBILE" placeholder="Contact number" >
                <span class="error-msg" id="MOBILE-msg"></span><br></td></tr>

                <tr><td><span>Password</span>
                <span class="error-msg">*</span> 
                <input type="password" name="Password" id="Password"placeholder="Password" >
                <span class="error-msg" id="Password-msg"></span><br></td></tr>

               <tr><td><span>Confirm Password</span>
                <span class="error-msg">*</span>
                <input type="password" name="c-password" id="c-password" placeholder="Confirm your Password" >
                <span class="error-msg" id="c-password-msg"></span><br></td></tr>
                 <tr><td style="text-align: center;"><input style="height: 50%;" type="submit" value="Join Now" onclick="return validate()" style="width: 50%; "><br><br></td></tr>
                 
                </table>
       
      
       </form>
    
    </div>
    <footer class="footer"></footer>
</div>
</body>
</html>
